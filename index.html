<script>
// ====== SERVICE WORKER INLINE ======
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'checador-v4';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('firebase') || e.request.method!== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          const copy = resp.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, copy));
          return resp;
        }))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

 apiKey: "AIzaSyC4FVokHFRbbTc4rBifNyt5bvOX2CuzkWw",

 projectId: "calificaciones-9f753",

 messagingSenderId: "907008005737",
 appId: "1:907008005737:web:3069998b0bad883cc574f8"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let empleado=null;
let estado="entrada";
let horaEntradaLocal=null;
let intervalo=null;
let dbLocal=null;
let sincronizando = false;

// ====== CONFIGURA TU PLANTA AQUÍ ======
const PLANTA = {
  lat: 27.6784068, // CAMBIA por la latitud de tu planta
  lng: -105.1625431, // CAMBIA por la longitud de tu planta
  radio: 150,
  toleranciaGPS: 50
};

// ====== INDEXEDDB PARA OFFLINE ======
function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("ChecadorDB", 2);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => {
      dbLocal = request.result;
      resolve(dbLocal);
    };
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("pendientes")) {
        db.createObjectStore("pendientes", { keyPath: "id", autoIncrement: true });
      }
      if (!db.objectStoreNames.contains("empleados")) {
        db.createObjectStore("empleados", { keyPath: "pin" });
      }
    };
  });
}

function guardarOffline(registro) {
  return new Promise((resolve, reject) => {
    const tx = dbLocal.transaction("pendientes", "readwrite");
    const store = tx.objectStore("pendientes");
    store.add(registro);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function obtenerPendientes() {
  return new Promise((resolve, reject) => {
    const tx = dbLocal.transaction("pendientes", "readonly");
    const store = tx.objectStore("pendientes");
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function borrarPendiente(id) {
  return new Promise((resolve, reject) => {
    const tx = dbLocal.transaction("pendientes", "readwrite");
    const store = tx.objectStore("pendientes");
    store.delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ====== CACHE DE EMPLEADOS PARA LOGIN OFFLINE ======
async function cachearEmpleados() {
  try {
    const snap = await db.collection("empleados").get();
    const tx = dbLocal.transaction("empleados", "readwrite");
    const store = tx.objectStore("empleados");
    snap.forEach(doc => {
      const data = doc.data();
      store.put({ pin: String(data.pin), nombre: data.nombre });
    });
  } catch(e) {
    console.log("No se pudo cachear empleados:", e);
  }
}

function buscarEmpleadoOffline(pin) {
  return new Promise((resolve, reject) => {
    const tx = dbLocal.transaction("empleados", "readonly");
    const store = tx.objectStore("empleados");
    const req = store.get(String(pin));
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ====== SYNC AUTOMÁTICO CON BACKOFF Y BLOQUEO ======
async function sincronizarPendientes() {
  if (!navigator.onLine || sincronizando) return;
  sincronizando = true;
  btn.disabled = true;

  try {
    const pendientes = await obtenerPendientes();
    if (pendientes.length === 0) {
      actualizarContadorPendientes(0);
      return;
    }

    msg.innerHTML = "🔄 Sincronizando " + pendientes.length + " registros...";

    for (const reg of pendientes) {
      let reintentos = 0;
      while (reintentos < 3) {
        try {
          if (reg.tipo === "entrada") {
            await db.collection("asistencia").add({
              nombre: reg.nombre,
              entrada: new Date(reg.timestamp),
              salida: null,
              lat: reg.lat,
              lng: reg.lng,
              precision: reg.precision || 0
            });
          } else if (reg.tipo === "salida") {
            const snap = await db.collection("asistencia")
    .where("nombre", "==", reg.nombre)
    .where("salida", "==", null)
    .get();
            for (const doc of snap.docs) {
              await db.collection("asistencia").doc(doc.id).update({
                salida: new Date(reg.timestamp)
              });
            }
          }
          await borrarPendiente(reg.id);
          break;
        } catch (e) {
          reintentos++;
          console.error(`Error sincronizando, intento ${reintentos}:`, e);
          if (reintentos >= 3) {
            msg.innerHTML = "⚠️ Error al sincronizar. Se reintentará después";
            return;
          }
          await new Promise(r => setTimeout(r, 1000 * reintentos));
        }
      }
    }

    localStorage.removeItem("estadoOffline");
    actualizarContadorPendientes(0);
    msg.innerHTML = "✅ Sincronizado";
    verificarEstado();
  } finally {
    sincronizando = false;
    btn.disabled = false;
  }
}

function actualizarContadorPendientes(cantidad) {
  const div = document.getElementById("pendientes");
  if (cantidad > 0) {
    div.innerHTML = `<span class="badge">⏳ ${cantidad} pendientes por subir</span>`;
  } else {
    div.innerHTML = "";
  }
}

// ====== DETECTAR CONEXIÓN ======
function actualizarStatusConexion() {
  const bar = document.getElementById("statusBar");
  if (navigator.onLine) {
    bar.innerHTML = "🟢 En línea";
    bar.className = "status-bar online";
    sincronizarPendientes();
    cachearEmpleados();
  } else {
    bar.innerHTML = "🔴 Sin conexión - Guardando local";
    bar.className = "status-bar offline";
  }
}

window.addEventListener("online", actualizarStatusConexion);
window.addEventListener("offline", actualizarStatusConexion);
document.addEventListener('visibilitychange', () => {
  if(!document.hidden && navigator.onLine) sincronizarPendientes();
});

// ====== LÓGICA PRINCIPAL ======
window.onload = async function(){
  await initDB();
  actualizarStatusConexion();

  const pendientes = await obtenerPendientes();
  actualizarContadorPendientes(pendientes.length);

  const usuarioGuardado = localStorage.getItem("empleado");
  if(usuarioGuardado){
    empleado = usuarioGuardado;
    loginBox.style.display="none";
    panel.style.display="block";
    nombre.innerHTML="👤 "+empleado;

    const entradaGuardada = localStorage.getItem("horaEntrada");
    if(entradaGuardada){
      horaEntradaLocal = new Date(parseInt(entradaGuardada));
      iniciarContador();
    }
    verificarEstado();
    actualizarUbicacionInfo();
  }
}

async function login(){
  const pinInput=document.getElementById("pin").value.trim();
  if(!pinInput){
    msgLogin.innerHTML="⚠️ Ingresa PIN";
    return;
  }

  const empleadoCache = await buscarEmpleadoOffline(pinInput);
  if (empleadoCache) {
    empleado = empleadoCache.nombre;
    localStorage.setItem("empleado", empleado);
    loginBox.style.display="none";
    panel.style.display="block";
    nombre.innerHTML="👤 "+empleado;
    msg.innerHTML = navigator.onLine? "" : "🔴 Login offline exitoso";
    verificarEstado();
    actualizarUbicacionInfo();
    return;
  }

  if (!navigator.onLine) {
    msgLogin.innerHTML="🔴 Sin conexión y PIN no encontrado en cache. Conéctate a internet 1 vez";
    return;
  }

  try {
    const snap = await db.collection("empleados").get();
    let encontrado=false;
    snap.forEach(doc=>{
      const data=doc.data();
      if(String(data.pin) === String(pinInput)){
        empleado=data.nombre;
        encontrado=true;
      }
    });

    if(!encontrado){
      msgLogin.innerHTML="❌ PIN incorrecto";
      return;
    }

    await cachearEmpleados();
    localStorage.setItem("empleado", empleado);
    loginBox.style.display="none";
    panel.style.display="block";
    nombre.innerHTML="👤 "+empleado;
    verificarEstado();
    actualizarUbicacionInfo();
  } catch(e) {
    msgLogin.innerHTML="❌ Error al conectar";
  }
}

// ====== GPS MEJORADO CON PROMEDIO Y PRECISIÓN ======
function obtenerUbicacion(){
  return new Promise((resolve)=>{
    let lecturas = [];
    let watchId = null;
    let timeout = setTimeout(() => {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (lecturas.length > 0) {
        const avgLat = lecturas.reduce((s,p)=>s+p.latitude,0)/lecturas.length;
        const avgLng = lecturas.reduce((s,p)=>s+p.longitude,0)/lecturas.length;
        const avgAcc = lecturas.reduce((s,p)=>s+p.accuracy,0)/lecturas.length;
        resolve({latitude:avgLat, longitude:avgLng, accuracy:avgAcc});
      } else {
        resolve({latitude:0, longitude:0, accuracy:9999});
      }
    }, 6000);

    watchId = navigator.geolocation.watchPosition(
      pos => {
        lecturas.push(pos.coords);
        if (lecturas.length >= 3 || pos.coords.accuracy < 30) {
          clearTimeout(timeout);
          navigator.geolocation.clearWatch(watchId);
          const avgLat = lecturas.reduce((s,p)=>s+p.latitude,0)/lecturas.length;
          const avgLng = lecturas.reduce((s,p)=>s+p.longitude,0)/lecturas.length;
          const avgAcc = lecturas.reduce((s,p)=>s+p.accuracy,0)/lecturas.length;
          resolve({latitude:avgLat, longitude:avgLng, accuracy:avgAcc});
        }
      },
      err => {
        console.log("GPS error:", err.message);
        clearTimeout(timeout);
        if (watchId) navigator.geolocation.clearWatch(watchId);
        resolve({latitude:0, longitude:0, accuracy:9999});
      },
      {enableHighAccuracy:true, timeout:8000, maximumAge:0}
    );
  });
}

function distanciaMetros(lat1, lng1, lat2, lng2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lng2-lng1) * Math.PI/180;

  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
          Math.cos(φ1) * Math.cos(φ2) *
          Math.sin(Δλ/2) * Math.sin(Δλ/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

function estaDentroDePlanta(lat, lng, accuracy) {
  if (lat === 0 && lng === 0) return {dentro:false, dist:0, precision:9999};
  const dist = distanciaMetros(lat, lng, PLANTA.lat, PLANTA.lng);
  const dentro = dist <= (PLANTA.radio + PLANTA.toleranciaGPS + accuracy);
  return {dentro, dist:Math.round(dist), precision:Math.round(accuracy)};
}

async function actualizarUbicacionInfo() {
  const div = document.getElementById("ubicacionInfo");
  if (!div) return;
  div.innerHTML = "📍 Obteniendo ubicación...";

  try {
    const pos = await obtenerUbicacion();
    if (pos.latitude === 0 && pos.longitude === 0) {
      div.innerHTML = "📍 GPS no disponible";
      return;
    }
    const res = estaDentroDePlanta(pos.latitude, pos.longitude, pos.accuracy);
    div.innerHTML = res.dentro
? `📍 Dentro de planta<br>Dist: ${res.dist}m | <span class="precision">Precisión: ±${res.precision}m</span>`
      : `📍 Fuera de planta<br>Dist: ${res.dist}m | <span class="precision">Precisión: ±${res.precision}m</span>`;
  } catch(e) {
    div.innerHTML = "";
  }
}

function iniciarContador(){
  clearInterval(intervalo);
  intervalo = setInterval(()=>{
    if(!horaEntradaLocal) return;
    const ahora = new Date();
    const diff = (ahora - horaEntradaLocal) / 1000;
    if(diff < 60){
      const restante = Math.ceil(60 - diff);
      msg.innerHTML = "⏳ Espera " + restante + " segundos para salida";
      btn.disabled = true;
    }else{
      msg.innerHTML = "✅ Ya puedes registrar salida";
      btn.disabled = false;
      clearInterval(intervalo);
    }
  },1000);
}

async function verificarEstado(){
  const estadoLocal = localStorage.getItem("estadoOffline");
  if (!navigator.onLine || estadoLocal) {
    estado = estadoLocal || (horaEntradaLocal? "salida" : "entrada");
    btn.innerHTML = estado === "entrada"? "Registrar Entrada" : "Registrar Salida";
    btn.disabled = false;
    if(estado === "salida" && horaEntradaLocal) iniciarContador();
    return;
  }

  try {
    const snap = await db.collection("asistencia")
.where("nombre","==",empleado)
.where("salida","==",null)
.get();

    if(snap.empty){
      estado="entrada";
      btn.innerHTML="Registrar Entrada";
      btn.disabled=false;
    }else{
      estado="salida";
      btn.innerHTML="Registrar Salida";
      const doc = snap.docs[0].data();
      horaEntradaLocal = doc.entrada.toDate();
      localStorage.setItem("horaEntrada", horaEntradaLocal.getTime());
      iniciarContador();
    }
  } catch(e) {
    console.error(e);
    estado = horaEntradaLocal? "salida" : "entrada";
    btn.innerHTML = estado === "entrada"? "Registrar Entrada" : "Registrar Salida";
  }
}

async function checar(){
  if (sincronizando) {
    msg.innerHTML = "⏳ Espera, sincronizando...";
    return;
  }

  msg.innerHTML="Obteniendo ubicación precisa...";
  const ahora = new Date();
  const fechaHora = ahora.toLocaleString();

  const ubicacion = await obtenerUbicacion();

  if (ubicacion.latitude === 0 && ubicacion.longitude === 0) {
    msg.innerHTML="❌ No se pudo obtener GPS. Actívalo y sal al exterior";
    return;
  }

  // VALIDACIÓN GEOFENCE CON TOLERANCIA
  if (estado === "entrada") {
    const res = estaDentroDePlanta(ubicacion.latitude, ubicacion.longitude, ubicacion.accuracy);
    if (!res.dentro) {
      msg.innerHTML=`❌ Estás fuera de la planta<br>Distancia: ${res.dist}m<br>Precisión GPS: ±${res.precision}m<br>Radio permitido: ${PLANTA.radio + PLANTA.toleranciaGPS}m`;
      actualizarUbicacionInfo();
      return;
    }
    msg.innerHTML=`✅ Dentro de planta<br>Dist: ${res.dist}m | Precisión: ±${res.precision}m`;
    await new Promise(r=>setTimeout(r,800));
  }

  msg.innerHTML="Procesando...";
  const registro = {
    tipo: estado,
    nombre: empleado,
    timestamp: ahora.getTime(),
    lat: ubicacion.latitude,
    lng: ubicacion.longitude,
    precision: Math.round(ubicacion.accuracy)
  };

  if (!navigator.onLine) {
    await guardarOffline(registro);
    const pendientes = await obtenerPendientes();
    actualizarContadorPendientes(pendientes.length);

    if(estado==="entrada"){
      horaEntradaLocal = ahora;
      localStorage.setItem("horaEntrada", ahora.getTime());
      localStorage.setItem("estadoOffline", "salida");
      iniciarContador();
      msg.innerHTML="💾 Entrada guardada offline<br><b>"+fechaHora+"</b>";
      estado = "salida";
      btn.innerHTML="Registrar Salida";
    } else {
      const diff = (ahora - horaEntradaLocal) / 1000;
      if(diff < 60){
        msg.innerHTML="⏳ Aún no puedes salir";
        return;
      }
      localStorage.removeItem("horaEntrada");
      localStorage.removeItem("estadoOffline");
      horaEntradaLocal = null;
      clearInterval(intervalo);
      msg.innerHTML="💾 Salida guardada offline<br><b>"+fechaHora+"</b>";
      estado = "entrada";
      btn.innerHTML="Registrar Entrada";
    }
    actualizarUbicacionInfo();
    return;
  }

  try{
    if(estado==="entrada"){
      await db.collection("asistencia").add({
        nombre:empleado,
        entrada:ahora,
        salida:null,
        lat:ubicacion.latitude,
        lng:ubicacion.longitude,
        precision: Math.round(ubicacion.accuracy)
      });
      horaEntradaLocal = ahora;
      localStorage.setItem("horaEntrada", ahora.getTime());
      localStorage.setItem("estadoOffline", "salida");
      iniciarContador();
      msg.innerHTML="✅ Entrada registrada<br><b>"+fechaHora+"</b>";
    }else{
      const diff = (ahora - horaEntradaLocal) / 1000;
      if(diff < 60){
        msg.innerHTML="⏳ Aún no puedes salir";
        return;
      }
      const snap=await db.collection("asistencia")
.where("nombre","==",empleado)
.where("salida","==",null)
.get();
      for(const doc of snap.docs){
        await db.collection("asistencia").doc(doc.id).update({
          salida:ahora
        });
      }
      localStorage.removeItem("horaEntrada");
      localStorage.removeItem("estadoOffline");
      horaEntradaLocal = null;
      clearInterval(intervalo);
      msg.innerHTML="🚪 Salida registrada<br><b>"+fechaHora+"</b>";
    }
    verificarEstado();
    actualizarUbicacionInfo();
  }catch(e){
    console.error(e);
    await guardarOffline(registro);
    localStorage.setItem("estadoOffline", estado === "entrada"? "salida" : "entrada");
    msg.innerHTML="💾 Error de red. Guardado offline";
  }
}

async function logout(){
  const pendientes = await obtenerPendientes();
  if (pendientes.length > 0) {
    if (!confirm(`Tienes ${pendientes.length} registros sin sincronizar. Si sales se pueden perder. ¿Salir de todos modos?`)) {
      return;
    }
  }
  localStorage.removeItem("empleado");
  localStorage.removeItem("horaEntrada");
  localStorage.removeItem("estadoOffline");
  clearInterval(intervalo);
  location.reload();
}
</script>
